server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # HSTS is intentionally omitted here: this server listens on plain HTTP 80.
    # HSTS must be emitted by the TLS-terminating reverse proxy (e.g. Traefik,
    # Caddy, or an AWS ALB) that sits in front of this container in production.
    # Sending HSTS over HTTP has no security benefit and is semantically wrong.

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
